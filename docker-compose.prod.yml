services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autozakaz-api
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./shared-data:/app/shared-data
      - ./storage:/app/storage
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/auth/me').then(r=>{process.exit(r.status<500?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: autozakaz-web
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.status<500?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
